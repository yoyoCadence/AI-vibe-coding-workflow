# VibeFlow — automatic Codex review on PR open/update.
# Requires repo secret: OPENAI_API_KEY (an OpenAI API key with Codex access).
# The reviewer runs read-only-ish (workspace-write only to emit its report file)
# and posts one comment per push. It never merges and never pushes.
name: VibeFlow Codex Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vibeflow-codex-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  codex-review:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Run Codex review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # Older codex versions: replace the login line with
        #   codex login --api-key "$OPENAI_API_KEY"
        run: |
          printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key
          git fetch origin "$BASE_REF" --quiet
          codex exec --sandbox workspace-write -m gpt-5-codex "You are the VibeFlow reviewer running in CI.
          Rules: read-only on implementation files; your ONLY output is the file codex-review.md in the repo root.
          1. If .agents/skills/vibe-flow/steps/review.md and .agents/skills/vibe-flow/references/review-rubric.md exist, follow them; otherwise do a rigorous spec-vs-diff review.
          2. Spec (if present): .ai/current-spec.md. Context: .ai/handoff.md, .ai/review-request.md.
          3. Review the diff: git diff origin/$BASE_REF...$HEAD_SHA
          4. Write codex-review.md in the .ai/review-result.md template format: verdict (approved|changes_requested|blocked), reviewed_commit: $HEAD_SHA, findings as '- [P0]..[P3] file:line - issue', acceptance criteria verification with evidence.
          5. Never include secret values in the report; reference file:line only. Do not modify any other file. Do not merge."
          test -s codex-review.md || { echo 'codex produced no review file' ; exit 1; }

      - name: Post review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            echo "## VibeFlow Codex review — \`${{ github.event.pull_request.head.sha }}\`"
            echo ""
            cat codex-review.md
          } > comment.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file comment.md
